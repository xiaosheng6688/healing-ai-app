<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>为你好心语</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    .container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }
    
    /* 雨滴 */
    .raindrop {
      position: fixed;
      width: 1px;
      height: 20px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15));
      animation: fall linear infinite;
      pointer-events: none;
    }
    @keyframes fall { to { transform: translateY(100vh); } }
    
    /* 页面 */
    .page { display: none; min-height: 100vh; padding-bottom: 100px; }
    .page.active { display: block; }
    
    /* 简洁首页 */
    .home-simple {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }
    .home-emoji { font-size: 100px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .home-title { font-size: 32px; font-weight: 300; margin-bottom: 8px; }
    .home-subtitle { color: #a855f7; font-size: 14px; margin-bottom: 40px; }
    .home-btn {
      width: 200px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border: none;
      border-radius: 30px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      margin: 8px 0;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .home-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(168,85,247,0.3); }
    .home-btn.secondary {
      background: transparent;
      border: 1px solid rgba(168,85,247,0.5);
    }
    .home-stats {
      display: flex;
      gap: 40px;
      margin-top: 40px;
      padding: 20px 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
    }
    .home-stat { text-align: center; }
    .home-stat-num { font-size: 24px; color: #a855f7; }
    .home-stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
    
    /* 顶部栏 */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(10,10,26,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-title { flex: 1; font-size: 16px; font-weight: 500; }
    .back-btn { 
      padding: 8px; 
      background: rgba(255,255,255,0.1); 
      border: none; 
      border-radius: 8px; 
      color: #9ca3af;
      cursor: pointer;
      font-size: 18px;
    }
    
    /* 聊天 */
    .chat-box {
      height: calc(100vh - 180px);
      overflow-y: auto;
      padding: 16px;
    }
    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .message.user .avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .bubble.ai {
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 18px 18px 18px 4px;
    }
    .bubble.user {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 18px 18px 4px 18px;
    }
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(0deg, #0a0a1a 0%, transparent 100%);
    }
    .input-box {
      display: flex;
      gap: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 8px 8px 8px 16px;
      max-width: 480px;
      margin: 0 auto;
    }
    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .input-box input::placeholder { color: #64748b; }
    .send-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border: none;
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 情绪 */
    .mood-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px 16px;
    }
    .mood-item {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .mood-item:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
    .mood-item.selected { background: rgba(168,85,247,0.2); border-color: #a855f7; }
    .mood-emoji { font-size: 36px; margin-bottom: 8px; }
    .mood-label { font-size: 12px; color: #9ca3af; }
    
    /* 冥想 */
    .meditate-list { padding: 16px; }
    .meditate-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .meditate-item:hover { background: rgba(255,255,255,0.1); }
    .meditate-item.active { background: rgba(168,85,247,0.15); border-color: #a855f7; }
    .meditate-emoji { font-size: 40px; }
    .meditate-info { flex: 1; }
    .meditate-title { font-size: 16px; margin-bottom: 4px; }
    .meditate-desc { font-size: 12px; color: #64748b; }
    .meditate-status {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .volume-control {
      padding: 20px 16px;
      background: rgba(255,255,255,0.05);
      margin: 0 16px 16px;
      border-radius: 16px;
    }
    .volume-control label { font-size: 12px; color: #64748b; display: block; margin-bottom: 8px; }
    .volume-slider {
      width: 100%;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #a855f7;
      cursor: pointer;
    }
    
    /* 日记 */
    .diary-input {
      width: calc(100% - 32px);
      margin: 16px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      color: #fff;
      font-size: 14px;
      min-height: 120px;
      resize: none;
      font-family: inherit;
    }
    .diary-btn {
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 14px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .diary-list { padding: 0 16px; }
    .diary-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .diary-date { font-size: 12px; color: #64748b; margin-bottom: 8px; }
    .diary-text { font-size: 14px; line-height: 1.6; }
    
    /* VIP弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: #1a1a2e;
      padding: 32px;
      border-radius: 24px;
      max-width: 320px;
      width: 100%;
      text-align: center;
    }
    .modal-icon { font-size: 48px; margin-bottom: 16px; }
    .modal-title { font-size: 20px; margin-bottom: 8px; }
    .modal-desc { color: #9ca3af; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    .modal-input {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      text-align: center;
      font-size: 16px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .modal-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div id="rain"></div>
    
    <!-- 简洁首页 -->
    <div id="home" class="page active">
      <div class="home-simple">
        <div class="home-emoji">🌧️</div>
        <h1 class="home-title">为你好心语</h1>
        <p class="home-subtitle">深夜有人陪你听雨</p>
        
        <button class="home-btn" onclick="showPage('chat')">开始倾诉</button>
        <button class="home-btn secondary" onclick="showPage('meditate')">冥想放松</button>
        
        <div class="home-stats">
          <div class="home-stat">
            <div class="home-stat-num" id="chatCount">10</div>
            <div class="home-stat-label">剩余次数</div>
          </div>
          <div class="home-stat">
            <div class="home-stat-num" id="vipStatus">免费</div>
            <div class="home-stat-label">账户状态</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 聊天 -->
    <div id="chat" class="page">
      <div class="header">
        <button class="back-btn" onclick="showPage('home')">←</button>
        <span class="header-title">心语</span>
      </div>
      <div class="chat-box" id="chatBox">
        <div class="message">
          <div class="avatar">🌸</div>
          <div class="bubble ai">嗨，我是心语 🌸<br><br>今晚天气有点凉，但我的陪伴是暖的。<br>有什么想聊的吗？</div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-box">
          <input type="text" id="chatInput" placeholder="说点什么..." onkeypress="if(event.key==='Enter')sendMessage()">
          <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>

    <!-- 情绪 -->
    <div id="mood" class="page">
      <div class="header">
        <button class="back-btn" onclick="showPage('home')">←</button>
        <span class="header-title">此刻心情</span>
      </div>
      <div style="padding: 20px 16px; text-align: center;">
        <p style="color: #9ca3af; font-size: 14px;">选择一个表情，记录此刻</p>
      </div>
      <div class="mood-grid">
        <div class="mood-item" onclick="saveMood(this, '开心', '😊')"><div class="mood-emoji">😊</div><div class="mood-label">开心</div></div>
        <div class="mood-item" onclick="saveMood(this, '平静', '😌')"><div class="mood-emoji">😌</div><div class="mood-label">平静</div></div>
        <div class="mood-item" onclick="saveMood(this, '难过', '😔')"><div class="mood-emoji">😔</div><div class="mood-label">难过</div></div>
        <div class="mood-item" onclick="saveMood(this, '焦虑', '😰')"><div class="mood-emoji">😰</div><div class="mood-label">焦虑</div></div>
        <div class="mood-item" onclick="saveMood(this, '生气', '😠')"><div class="mood-emoji">😠</div><div class="mood-label">生气</div></div>
        <div class="mood-item" onclick="saveMood(this, '疲惫', '😴')"><div class="mood-emoji">😴</div><div class="mood-label">疲惫</div></div>
      </div>
      <div id="moodMsg" style="text-align: center; color: #a855f7; font-size: 14px; margin-top: 20px;"></div>
    </div>

    <!-- 冥想 -->
    <div id="meditate" class="page">
      <div class="header">
        <button class="back-btn" onclick="showPage('home')">←</button>
        <span class="header-title">冥想</span>
      </div>
      <div class="meditate-list">
        <div class="meditate-item" id="scene-rain" onclick="playSound('rain')">
          <div class="meditate-emoji">🌧️</div>
          <div class="meditate-info">
            <div class="meditate-title">雨夜窗边</div>
            <div class="meditate-desc">密集雨滴，适合失眠</div>
          </div>
          <div class="meditate-status" id="btn-rain">▶</div>
        </div>
        <div class="meditate-item" id="scene-ocean" onclick="playSound('ocean')">
          <div class="meditate-emoji">🌊</div>
          <div class="meditate-info">
            <div class="meditate-title">海边日落</div>
            <div class="meditate-desc">海浪起伏，深呼吸</div>
          </div>
          <div class="meditate-status" id="btn-ocean">▶</div>
        </div>
        <div class="meditate-item" id="scene-forest" onclick="playSound('forest')">
          <div class="meditate-emoji">🌲</div>
          <div class="meditate-info">
            <div class="meditate-title">森林漫步</div>
            <div class="meditate-desc">虫鸣鸟叫，自然白噪</div>
          </div>
          <div class="meditate-status" id="btn-forest">▶</div>
        </div>
        <div class="meditate-item" id="scene-cafe" onclick="playSound('cafe')">
          <div class="meditate-emoji">☕</div>
          <div class="meditate-info">
            <div class="meditate-title">温暖咖啡馆</div>
            <div class="meditate-desc">人声低语，专注工作</div>
          </div>
          <div class="meditate-status" id="btn-cafe">▶</div>
        </div>
      </div>
      <div class="volume-control">
        <label>音量</label>
        <input type="range" class="volume-slider" min="0" max="100" value="50" oninput="setVolume(this.value)">
      </div>
    </div>

    <!-- 日记 -->
    <div id="diary" class="page">
      <div class="header">
        <button class="back-btn" onclick="showPage('home')">←</button>
        <span class="header-title">日记</span>
      </div>
      <textarea class="diary-input" id="diaryInput" placeholder="写下此刻的心情..."></textarea>
      <button class="diary-btn" onclick="saveDiary()">保存</button>
      <div class="diary-list" id="diaryList"></div>
    </div>

    <!-- VIP弹窗 -->
    <div id="vipModal" class="modal hidden" onclick="hideVIPModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-icon">👑</div>
        <div class="modal-title">升级VIP</div>
        <div class="modal-desc">解锁无限对话<br>所有冥想场景<br>永久使用权限</div>
        <input type="text" class="modal-input" id="vipCode" placeholder="输入激活码">
        <button class="modal-btn" onclick="activateVIP()">激活</button>
      </div>
    </div>
  </div>

  <script>
    // 存储
    const storage = {
      get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
      set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
    };

    // 初始化
    if (!storage.get('userId')) {
      storage.set('userId', 'user_' + Date.now());
      storage.set('chatCount', 10);
    }

    // 页面切换
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(page).classList.add('active');
      if (page === 'home') updateHome();
      if (page === 'diary') loadDiary();
    }

    // 首页状态
    function updateHome() {
      const vip = checkVIP();
      const count = vip ? '∞' : (storage.get('chatCount') || 10);
      document.getElementById('chatCount').textContent = count;
      document.getElementById('vipStatus').textContent = vip ? 'VIP' : '免费';
      document.getElementById('vipStatus').style.color = vip ? '#fbbf24' : '#fff';
    }

    function checkVIP() {
      const exp = storage.get('vip_expires');
      return exp && new Date(exp) > new Date();
    }

    // AI回复
    const replies = {
      '想死': '我知道你现在很难，真的很难。但我在这里。',
      '自杀': '听到你这样说，我很难过。你不是一个人。',
      '哭': '哭吧，这里只有我和你。眼泪不是软弱。',
      '累': '你已经很努力了。可以休息一下。',
      '睡不着': '外面好像在下雨...闭上眼睛，我陪着你。',
      '失眠': '失眠的夜晚，总有人在陪你。我就在。',
      '烦': '有些事情真的很让人烦躁。说出来会不会好点？',
      '孤独': '你不是一个人。至少现在，有我在。',
      '难过': '被伤害的感觉，真的很痛。我在。',
      '伤心': '被伤害的感觉，真的很痛。我在。',
      '开心': '真好！能感受到你的开心 🌸',
      '高兴': '真好！能感受到你的开心 🌸',
      '谢谢': '谢谢你愿意告诉我这些。',
      '感谢': '谢谢你愿意告诉我这些。',
      '你好': '嗨，我在呢。有什么想说的吗？',
      '在吗': '在的，一直在。',
      '拜拜': '嗯，随时回来找我。',
      '再见': '随时回来，我都在。',
      '分手': '分手后的那种空，不是你的问题。需要时间。',
      '失恋': '分手后的那种空，不是你的问题。需要时间。',
      '考试': '考试前的焦虑我懂。深呼吸，我陪你一起面对。',
      '对不起': '不需要道歉。你没有做错什么。',
      '抱歉': '不需要道歉。你没有做错什么。',
      '家人': '家人的事情往往最复杂。你一定很不容易。',
      '父母': '家人的事情往往最复杂。你一定很不容易。',
      '朋友': '朋友之间的关系，有时候比想象中更脆弱。',
      '钱': '钱的问题真的很现实。能说出来已经很勇敢了。',
      '工作': '工作的事情确实让人压力很大。辛苦了。',
      '加班': '工作的事情确实让人压力很大。辛苦了。',
      '爱情': '感情的事情，有时候真的很让人困惑。',
      '恋爱': '感情的事情，有时候真的很让人困惑。',
      '压力': '压力大的感觉，像是被什么压着喘不过气。我懂。',
      '焦虑': '焦虑的感觉像被困住。我陪你慢慢呼吸。',
      '抑郁': '那种沉重的感觉，像是被什么压着。我在这里，不走。'
    };
    const defaults = ['我在。', '嗯，我在听。', '我在这里。', '说吧，我听着呢。', '然后呢？', '我懂。', '嗯...'];

    function getReply(msg) {
      for (let k in replies) if (msg.includes(k)) return replies[k];
      return defaults[Math.floor(Math.random() * defaults.length)];
    }

    // 聊天
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;

      const vip = checkVIP();
      let count = storage.get('chatCount') || 10;

      if (!vip && count <= 0) {
        document.getElementById('vipModal').classList.remove('hidden');
        return;
      }

      const box = document.getElementById('chatBox');
      box.innerHTML += `<div class="message user"><div class="avatar">我</div><div class="bubble user">${msg}</div></div>`;
      input.value = '';
      box.scrollTop = box.scrollHeight;

      if (!vip) storage.set('chatCount', count - 1);
      updateHome();

      setTimeout(() => {
        const reply = getReply(msg);
        box.innerHTML += `<div class="message"><div class="avatar">🌸</div><div class="bubble ai">${reply}</div></div>`;
        box.scrollTop = box.scrollHeight;
      }, 400);
    }

    // 情绪
    function saveMood(el, label, emoji) {
      document.querySelectorAll('.mood-item').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('moodMsg').textContent = `已记录：${emoji} ${label}`;
      const history = storage.get('moodHistory') || [];
      history.unshift({ label, emoji, date: new Date().toLocaleString('zh-CN') });
      storage.set('moodHistory', history.slice(0, 30));
    }

    // ========== 冥想音频（四种独特风格）==========
    let audioCtx = null, gainNode = null, currentSource = null, currentScene = null, isPlaying = false;
    let lfoNode = null, lfoGain = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0.5;
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 雨声：密集粉红噪音 + 低通滤波
    function createRain() {
      const bufferSize = 2 * audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = buffer.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i=0; i<bufferSize; i++) {
        const white = Math.random()*2-1;
        b0=0.99886*b0+white*0.0555179;
        b1=0.99332*b1+white*0.0750759;
        b2=0.96900*b2+white*0.1538520;
        b3=0.86650*b3+white*0.3104856;
        b4=0.55000*b4+white*0.5329522;
        b5=-0.7616*b5-white*0.0168980;
        output[i]=(b0+b1+b2+b3+b4+b5+b6+white*0.5362)*0.15;
        b6=white*0.115926;
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      noise.loop = true;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 600;
      noise.connect(filter);
      filter.connect(gainNode);
      return noise;
    }

    // 海浪：布朗噪音 + 低频振荡器模拟潮汐
    function createOcean() {
      const bufferSize = 2 * audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = buffer.getChannelData(0);
      let last=0;
      for (let i=0; i<bufferSize; i++) {
        const white = Math.random()*2-1;
        output[i]=(last+0.02*white)/1.02;
        last=output[i];
        output[i]*=4;
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      noise.loop = true;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 300;
      
      // 潮汐效果
      lfoNode = audioCtx.createOscillator();
      lfoNode.type = 'sine';
      lfoNode.frequency.value = 0.08;
      lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.3;
      lfoNode.connect(lfoGain);
      lfoGain.connect(gainNode.gain);
      lfoNode.start();
      
      noise.connect(filter);
      filter.connect(gainNode);
      return noise;
    }

    // 森林：风声 + 虫鸣 + 偶尔鸟叫
    function createForest() {
      const sources = [];
      
      // 风声（带通滤波白噪）
      const windBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate*2, audioCtx.sampleRate);
      const windData = windBuffer.getChannelData(0);
      for (let i=0; i<windData.length; i++) windData[i]=(Math.random()*2-1)*0.3;
      const wind = audioCtx.createBufferSource();
      wind.buffer = windBuffer;
      wind.loop = true;
      const windFilter = audioCtx.createBiquadFilter();
      windFilter.type = 'bandpass';
      windFilter.frequency.value = 400;
      windFilter.Q.value = 0.5;
      const windGain = audioCtx.createGain();
      windGain.gain.value = 0.4;
      wind.connect(windFilter);
      windFilter.connect(windGain);
      windGain.connect(gainNode);
      sources.push(wind);
      
      // 虫鸣1 - 高频脉冲
      const cricket1 = audioCtx.createOscillator();
      cricket1.type = 'square';
      cricket1.frequency.value = 4200;
      const c1Gain = audioCtx.createGain();
      c1Gain.gain.value = 0.015;
      cricket1.connect(c1Gain);
      c1Gain.connect(gainNode);
      cricket1.start();
      sources.push(cricket1);
      
      // 虫鸣2 - 锯齿波
      const cricket2 = audioCtx.createOscillator();
      cricket2.type = 'sawtooth';
      cricket2.frequency.value = 3800;
      const c2Gain = audioCtx.createGain();
      c2Gain.gain.value = 0.012;
      cricket2.connect(c2Gain);
      c2Gain.connect(gainNode);
      cricket2.start();
      sources.push(cricket2);
      
      // 鸟叫 - 变频正弦波
      const bird = audioCtx.createOscillator();
      bird.type = 'sine';
      bird.frequency.setValueAtTime(2000, audioCtx.currentTime);
      bird.frequency.exponentialRampToValueAtTime(3000, audioCtx.currentTime+0.1);
      const birdGain = audioCtx.createGain();
      birdGain.gain.setValueAtTime(0, audioCtx.currentTime);
      birdGain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime+0.05);
      birdGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.3);
      bird.connect(birdGain);
      birdGain.connect(gainNode);
      bird.start();
      
      return sources;
    }

    // 咖啡馆：人声嗡嗡 + 杯碟声 + 咖啡机蒸汽
    function createCafe() {
      const sources = [];
      
      // 人声背景（低通粉红噪音）
      const voiceBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate*2, audioCtx.sampleRate);
      const voiceData = voiceBuffer.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i=0; i<voiceData.length; i++) {
        const white = Math.random()*2-1;
        b0=0.99886*b0+white*0.0555179;
        b1=0.99332*b1+white*0.0750759;
        b2=0.96900*b2+white*0.1538520;
        b3=0.86650*b3+white*0.3104856;
        b4=0.55000*b4+white*0.5329522;
        b5=-0.7616*b5-white*0.0168980;
        voiceData[i]=(b0+b1+b2+b3+b4+b5+b6+white*0.5362)*0.08;
        b6=white*0.115926;
      }
      const voices = audioCtx.createBufferSource();
      voices.buffer = voiceBuffer;
      voices.loop = true;
      const voiceFilter = audioCtx.createBiquadFilter();
      voiceFilter.type = 'lowpass';
      voiceFilter.frequency.value = 800;
      voices.connect(voiceFilter);
      voiceFilter.connect(gainNode);
      sources.push(voices);
      
      // 杯碟轻响 - 随机高频点击
      const click = audioCtx.createOscillator();
      click.type = 'triangle';
      click.frequency.value = 6000;
      const clickGain = audioCtx.createGain();
      clickGain.gain.value = 0;
      click.connect(clickGain);
      clickGain.connect(gainNode);
      click.start();
      
      // 随机触发点击
      const clickLFO = audioCtx.createOscillator();
      clickLFO.type = 'sawtooth';
      clickLFO.frequency.value = 0.2;
      const clickLFOGain = audioCtx.createGain();
      clickLFOGain.gain.value = 0.008;
      clickLFO.connect(clickLFOGain);
      clickLFOGain.connect(clickGain.gain);
      clickLFO.start();
      sources.push(click, clickLFO);
      
      // 咖啡机蒸汽 - 高通白噪
      const steamBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate*2, audioCtx.sampleRate);
      const steamData = steamBuffer.getChannelData(0);
      for (let i=0; i<steamData.length; i++) steamData[i]=(Math.random()*2-1)*0.2;
      const steam = audioCtx.createBufferSource();
      steam.buffer = steamBuffer;
      steam.loop = true;
      const steamFilter = audioCtx.createBiquadFilter();
      steamFilter.type = 'highpass';
      steamFilter.frequency.value = 3000;
      const steamGain = audioCtx.createGain();
      steamGain.gain.value = 0.06;
      steam.connect(steamFilter);
      steamFilter.connect(steamGain);
      steamGain.connect(gainNode);
      sources.push(steam);
      
      return sources;
    }

    function playSound(type) {
      initAudio();
      
      if (currentScene === type && isPlaying) {
        stopSound();
        return;
      }
      
      stopSound();
      currentScene = type;
      
      document.querySelectorAll('.meditate-item').forEach(el => el.classList.remove('active'));
      document.getElementById('scene-' + type).classList.add('active');
      
      ['rain','ocean','forest','cafe'].forEach(t => {
        document.getElementById('btn-' + t).textContent = t === type ? '⏸' : '▶';
      });
      
      if (type === 'rain') {
        currentSource = createRain();
        currentSource.start();
      } else if (type === 'ocean') {
        currentSource = createOcean();
        currentSource.start();
      } else if (type === 'forest') {
        currentSource = createForest();
        currentSource.forEach(s => s.start ? s.start() : null);
      } else if (type === 'cafe') {
        currentSource = createCafe();
        currentSource.forEach(s => s.start ? s.start() : null);
      }
      
      isPlaying = true;
    }

    function stopSound() {
      if (currentSource) {
        if (Array.isArray(currentSource)) {
          currentSource.forEach(s => { try { s.stop(); } catch(e){} });
        } else {
          try { currentSource.stop(); } catch(e){}
        }
        currentSource = null;
      }
      if (lfoNode) { try { lfoNode.stop(); } catch(e){} lfoNode = null; }
      if (lfoGain) { lfoGain = null; }
      isPlaying = false;
      currentScene = null;
      document.querySelectorAll('.meditate-item').forEach(el => el.classList.remove('active'));
      ['rain','ocean','forest','cafe'].forEach(t => document.getElementById('btn-' + t).textContent = '▶');
    }

    function setVolume(v) {
      if (gainNode) gainNode.gain.value = v / 100;
    }

    // 日记
    function saveDiary() {
      const text = document.getElementById('diaryInput').value.trim();
      if (!text) return;
      const diaries = storage.get('diaries') || [];
      diaries.unshift({ text, date: new Date().toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) });
      storage.set('diaries', diaries.slice(0, 50));
      document.getElementById('diaryInput').value = '';
      loadDiary();
    }

    function loadDiary() {
      const diaries = storage.get('diaries') || [];
      const div = document.getElementById('diaryList');
      if (diaries.length === 0) {
        div.innerHTML = '<div style="text-align:center;color:#64748b;padding:40px;">还没有日记</div>';
        return;
      }
      div.innerHTML = diaries.slice(0, 10).map(d => `
        <div class="diary-item">
          <div class="diary-date">${d.date}</div>
          <div class="diary-text">${d.text}</div>
        </div>
      `).join('');
    }

    // VIP
    function hideVIPModal(e) {
      if (e.target.id === 'vipModal') document.getElementById('vipModal').classList.add('hidden');
    }

    function activateVIP() {
      const code = document.getElementById('vipCode').value.trim().toUpperCase();
      const validCodes = ['XINYU666', 'XINYU888', 'DEV2026', 'FREEVIP', 'FOREVER', 'OWNER2026', 'HEART2026'];
      
      if (validCodes.includes(code)) {
        const isPermanent = ['FOREVER', 'OWNER2026'].includes(code);
        storage.set('vip_expires', isPermanent ? '2126-12-31' : new Date(Date.now()+365*86400000).toISOString());
        alert(isPermanent ? '永久VIP已激活！' : 'VIP已激活（1年）');
        document.getElementById('vipModal').classList.add('hidden');
        updateHome();
      } else {
        alert('激活码无效');
      }
    }

    // 雨滴
    function createRain() {
      const rain = document.getElementById('rain');
      for (let i = 0; i < 12; i++) {
        const drop = document.createElement('div');
        drop.className = 'raindrop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDelay = Math.random() * 3 + 's';
        drop.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        rain.appendChild(drop);
      }
    }

    createRain();
    updateHome();
  </script>
